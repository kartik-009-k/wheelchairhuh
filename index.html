<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Emergency Transfer</title>
<style>
body { margin:0; overflow:hidden; background:#0f0f0f; font-family:Arial; }
canvas { display:block; }

#popup {
position:fixed;
top:0; left:0;
width:100%; height:100%;
background:rgba(0,0,0,0.9);
color:#00ffcc;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
font-size:22px;
z-index:10;
}

#popup button {
padding:15px 30px;
font-size:18px;
margin-top:20px;
border:none;
background:#00ffcc;
}

.ui {
position:fixed;
top:10px;
left:10px;
color:#00ffcc;
font-size:18px;
}

.controls {
position:fixed;
bottom:20px;
width:100%;
text-align:center;
}

button.control {
width:65px;
height:65px;
margin:8px;
border-radius:50%;
border:none;
font-size:20px;
background:#00ffcc;
}
button.control:active { background:#ffcc00; }
</style>
</head>
<body>

<div id="popup">
    <div>
        ❤️ The patient is critical.<br><br>
        Guide the patient to the hospital<br>
        before he dies.<br><br>
        Avoid traffic. Use boost wisely.
    </div>
    <button onclick="startGame()">START MISSION</button>
</div>

<canvas id="game"></canvas>

<div class="ui">
❤️ Heart: <span id="heart">100</span><br>
⏳ Time: <span id="time">70</span>s
</div>

<div class="controls">
<button class="control" id="left"></button>
<button class="control" id="forward"></button>
<button class="control" id="boost">🚀</button>
<button class="control" id="backward"></button>
<button class="control" id="right"></button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let running = false;

function startGame(){
document.getElementById("popup").style.display="none";
running = true;
}

let chairImg = new Image();
chairImg.src = "wheelchair.png";

let carImg = new Image();
carImg.src = "car.png";

let chair = {
x:80,
y:80,
angle:0,
speed:0,
maxSpeed:6,
acceleration:0.15,
friction:0.96
};

let heart = 100;
let timeLeft = 70;

const hospital = {
x: canvas.width - 150,
y: canvas.height - 150,
w:120,
h:120
};

const buildings = [
{ x:250, y:0, w:200, h:300 },
{ x:250, y:400, w:200, h:400 },
{ x:600, y:150, w:250, h:250 },
{ x:950, y:350, w:200, h:250 }
];

const road = {
x: canvas.width/2 - 80,
y: 0,
w:160,
h:canvas.height
};

let cars = [];
for(let i=0;i<4;i++){
cars.push({
x: road.x + 40,
y: Math.random()*canvas.height,
speed: 2 + Math.random()*2
});
}

let keys={};

["left","right","forward","backward","boost"].forEach(id=>{
document.getElementById(id).ontouchstart=()=>keys[id]=true;
document.getElementById(id).ontouchend=()=>keys[id]=false;
});

document.addEventListener("keydown",e=>{
if(e.key==="ArrowLeft")keys.left=true;
if(e.key==="ArrowRight")keys.right=true;
if(e.key==="ArrowUp")keys.forward=true;
if(e.key==="ArrowDown")keys.backward=true;
if(e.key===" ")keys.boost=true;
});
document.addEventListener("keyup",e=>{
if(e.key==="ArrowLeft")keys.left=false;
if(e.key==="ArrowRight")keys.right=false;
if(e.key==="ArrowUp")keys.forward=false;
if(e.key==="ArrowDown")keys.backward=false;
if(e.key===" ")keys.boost=false;
});

function collideRect(ax,ay,aw,ah,bx,by,bw,bh){
return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}

function update(){

if(!running) return;

heart -= 0.02;
timeLeft -= 0.015;

document.getElementById("heart").innerText=Math.floor(heart);
document.getElementById("time").innerText=Math.floor(timeLeft);

if(keys.left) chair.angle -= 0.05;
if(keys.right) chair.angle += 0.05;

if(keys.forward) chair.speed += chair.acceleration;
if(keys.backward) chair.speed -= chair.acceleration;

if(keys.boost) chair.speed += 0.4;

if(chair.speed > chair.maxSpeed) chair.speed = chair.maxSpeed;
if(chair.speed < -chair.maxSpeed/2) chair.speed = -chair.maxSpeed/2;

chair.speed *= chair.friction;

let prevX = chair.x;
let prevY = chair.y;

chair.x += Math.cos(chair.angle) * chair.speed;
chair.y += Math.sin(chair.angle) * chair.speed;

if(chair.x < 0 || chair.x > canvas.width || chair.y < 0 || chair.y > canvas.height){
chair.x = prevX;
chair.y = prevY;
chair.speed *= -0.4;
}

buildings.forEach(b=>{
if(collideRect(chair.x-20,chair.y-20,40,40,b.x,b.y,b.w,b.h)){
chair.x = prevX;
chair.y = prevY;
chair.speed *= -0.6;
}
});

cars.forEach(car=>{
car.y += car.speed;
if(car.y > canvas.height) car.y = -60;

if(collideRect(chair.x-20,chair.y-20,40,40,car.x,car.y,60,40)){
chair.speed *= -0.7;
heart -= 5;
}
});

if(collideRect(chair.x-20,chair.y-20,40,40,hospital.x,hospital.y,hospital.w,hospital.h)){
alert("🚑 ICU reached. Patient stabilized.");
location.reload();
}

if(heart<=0 || timeLeft<=0){
alert("💔 Too late. Try again.");
location.reload();
}
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

// Vertical road
ctx.fillStyle="#2a2a2a";
ctx.fillRect(road.x,road.y,road.w,road.h);

// Road lines
ctx.strokeStyle="#ffffff55";
ctx.setLineDash([20,20]);
ctx.beginPath();
ctx.moveTo(canvas.width/2,0);
ctx.lineTo(canvas.width/2,canvas.height);
ctx.stroke();
ctx.setLineDash([]);

// Buildings
ctx.fillStyle="#333";
buildings.forEach(b=>ctx.fillRect(b.x,b.y,b.w,b.h));

// Cars (image)
cars.forEach(car=>{
ctx.drawImage(carImg,car.x,car.y,60,40);
});

// Hospital glow
ctx.fillStyle="green";
ctx.fillRect(hospital.x,hospital.y,hospital.w,hospital.h);
ctx.shadowColor="lime";
ctx.shadowBlur=20;
ctx.fillRect(hospital.x,hospital.y,hospital.w,hospital.h);
ctx.shadowBlur=0;

// Cinematic wobble
let wobble = Math.sin(Date.now()/120) * 3;

ctx.save();
ctx.translate(chair.x,chair.y + wobble);
ctx.rotate(chair.angle + wobble*0.01);
ctx.drawImage(chairImg,-25,-20,50,40);
ctx.restore();
}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
